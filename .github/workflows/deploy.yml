name: Deploy to AWS (S3 + CloudFront)

# Builds the static site and publishes it to S3, then invalidates the
# CloudFront cache so the new build is served immediately.
#
# Auth is via GitHub OIDC -> an AWS IAM role (no long-lived keys).
# Configure these in the repo before the first run:
#   Secret:  AWS_ROLE_ARN                 (IAM role with OIDC trust for this repo)
#   Var:     AWS_REGION                   (e.g. eu-north-1 — the bucket region)
#   Var:     S3_BUCKET                    (e.g. layerlogic-se-site)
#   Var:     CLOUDFRONT_DISTRIBUTION_ID   (e.g. E123ABC...)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC

concurrency:
  group: aws-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is taken from `packageManager` in package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ "s3://${{ vars.S3_BUCKET }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
